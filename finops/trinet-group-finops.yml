description: FinOps shape for TriNet cannot be reconciled from public sources; pricing is
  consultative-only and PEO billing is delivered via traditional invoice rather than a usage API.
sources:
  - https://www.trinet.com
notes: TriNet is a PEO; pricing is per-company-quote and consumption telemetry for any partner
  integration sits inside the authenticated partner portal. FOCUS columns and meters can only be
  validated against the executed PEO contract.
