meters:
  - name: worksite_employees
    unit: seat
    aggregation: avg
    dimensions:
      - state
      - benefits_plan
principles:
  - name: Visibility
    description: Worksite employee count, benefits enrollment, and payroll runs are visible inside
      the TriNet platform; finance reconciles against the monthly PEO invoice.
  - name: Allocation
    description: Allocate cost per worksite employee, state, and benefits plan using TriNet's
      existing employee record dimensions.
  - name: Optimization
    description: Optimization is contractual — review benefits plan mix and PEO scope at renewal.
  - name: Accountability
    description: HR / People Operations owns the TriNet relationship; finance manages the monthly
      PEO invoice cycle.
